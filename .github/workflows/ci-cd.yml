name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '7.0.x'
  NODE_VERSION: '22'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore backend/TransNet.sln

      - name: Build
        run: dotnet build backend/TransNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/TransNet.sln --configuration Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check and build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f docker/Dockerfile.api -t transnet-api:${{ github.sha }} .

      - name: Build Frontend Docker image
        run: docker build -f docker/Dockerfile.frontend -t transnet-frontend:${{ github.sha }} --build-arg VITE_API_BASE_URL=/api/v1 .

      # Deploy step: configure SSH secrets for Hostinger VPS
